name: thali
description: "Thali - Indian Food Calorie Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Camera
  camera: ^0.11.1
  image_picker: ^1.1.2

  # Networking
  http: ^1.3.0
  dio: ^5.7.0

  # Backend (Supabase: auth, database, storage)
  supabase_flutter: ^2.8.0
  connectivity_plus: ^6.1.0
  flutter_image_compress: ^2.3.0

  # UI Effects
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # Image handling
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.6.4
  build_runner: ^2.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
